name: Python CI CD

on:
    push:
        branches:
            - main
            - develop
    pull_request:
        branches:
            - main
            - develop
    workflow_dispatch:

jobs:
    lint:
        name: Lint and Format Check
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"
            - name: Upgrade pip
              run: python -m pip install --upgrade pip

            - name: Install project with dev dependencies
              run: pip install .[dev]

            - name: Run Ruff lint
              run: ruff check .

            - name: Run Ruff format check
              run: ruff format --check .

    test:
        name: Run Tests
        runs-on: ubuntu-latest
        needs: lint

        strategy:
            matrix:
                python-version: ["3.10", "3.11", "3.12"]
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Python${{matrix.python-version}}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version}}

            - name: Upgrade pip
              run: python -m pip install --upgrade pip

            - name: Install project with dev dependencies
              run: pip install .[dev]

            - name: Run pytest
              run: pytest
    build:
        name: Build Distribution
        runs-on: ubuntu-latest
        needs: test

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Upgrade pip
              run: python -m pip install --upgrade pip

            - name: Install build tooling
              run: pip install .[dev]

            - name: Build package
              run: python -m build

            - name: Upload distribution artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: python-dist
                  path: dist/

    publish-check:
        name: Publish Gate Check
        runs-on: ubuntu-latest
        needs: build
        if: github.ref== 'refs/heads/main' &&github.event_name=='push'

        steps:
            - name: Download built distribution
              uses: actions/download-artifact@v4
              with:
                  name: python-dist
                  path: dist/

            - name: Show distribution files
              run: ls -la dist/

            - name: Placeholder publish step
              run: echo "THis is where publishing or deployment would happen"
